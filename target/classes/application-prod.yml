spring:
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region:
        static: ${AWS_REGION:us-east-1}
      s3:
        bucket-name: ${S3_BUCKET:}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:redshift://your-cluster.region.redshift.amazonaws.com:5439/your_db}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.amazon.redshift.jdbc.Driver
    hikari:
      maximum-pool-size: 20

  batch:
    jdbc:
      initialize-schema: never

app:
  s3:
    key: ${S3_KEY:}
    use-local-file: false
  batch:
    chunk-size: 500

logging:
  level:
    com.example.springbatchdemo: INFO
    org.springframework.batch: WARN
