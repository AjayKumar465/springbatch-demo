spring:
  application:
    name: springbatch-demo
  profiles:
    active: local
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region:
        static: ${AWS_REGION:us-east-1}
      s3:
        bucket-name: ${S3_BUCKET:springbatch-demo}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false

  batch:
    job:
      enabled: true
    jdbc:
      initialize-schema: always

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

app:
  batch:
    chunk-size: 100
    skip-limit: 10
    retry-limit: 3
  s3:
    key: 
    use-folder: true
    prefix: ${S3_PREFIX:data}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.example.springbatchdemo: INFO
    org.springframework.batch: INFO
